# Test datasource — H2 in-memory replaces MySQL so integration tests run without a real DB.
# Hibernate generates the schema from entities (create-drop); seed data is NOT needed for unit/integration tests.
spring.datasource.url=jdbc:h2:mem:seal_test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# JWT: Base64 of 38-byte test key (NOT used in production)
# Decoded value: abcdefghijklmnopqrstuvwxyz1234567890ab
jwt.secret=YWJjZGVmZ2hpamtsbW5vcHFyc3R1dnd4eXoxMjM0NTY3ODkwYWI=
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# CORS
cors.allowed-origins=http://localhost:3000
